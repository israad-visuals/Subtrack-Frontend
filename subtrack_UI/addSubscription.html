<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SubTrack Add Subscription</title>
    <link rel="stylesheet" href="subtrack_styles.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
<div class="logo">
    <h1>Subtrack</h1>
    <h2>Take control of your subscriptions</h2>
</div>

<div class="login-card">
    <h3>Add new Subscriptions</h3>
    <form action="dashboard.html">
        <label for="email">Service name:</label>
        <input  type="email" id="email" placeholder="e.g: Netflix/Spotify">
        <label for="password">Amount: </label>
        <input type="password" id="password" placeholder="0.00">
        <label for="remember-me">Is this a free trial?</label>
        <input type="checkbox"  id="remember-me">
        <div class="primary-button">
            <button type="submit">Sign in</button>
        </div>
        <div class="divider-line">
            <hr>
            <p>or</p>
            <hr>
        </div>
        <div class="register">
            <p>Don't have an Account? <a href="register.html">Sign up!</a></p>
        </div>
    </form>
</div>

</body>
</html>
