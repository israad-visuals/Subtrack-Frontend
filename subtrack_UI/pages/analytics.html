<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SubTrack Analytics</title>
    <link rel="stylesheet" href="css/subtrack_styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="dash-body">
<div id="nav"></div>

<script>
    fetch("navbar.html").then(r=>r.text()).then(html=>document.getElementById("nav").innerHTML=html);
</script>

<div class="wrapper">
    <div class="dash-welcome">
        <h2>Spending Analytics</h2>
    </div>

    <div class="analytics-cards">
        <div class="analytics-stat-card">
            <h3>Monthly Burn Rate</h3>
            <p class="burn-rate-total" id="burnRate">$0.00</p>
            <p class="analytics-subtitle">this is what you spend every month on subscriptions</p>
        </div>

        <div class="analytics-stat-card">
            <h3>Savings Summary</h3>
            <p class="savings-text" id="savingsText">
                loading...
            </p>
            <div class="green-light analytics-badge">GREAT JOB</div>
        </div>
    </div>

    <div class="upcoming analytics-section">
        <h2>Top Expenses</h2>
        <table class="subscriptions">
            <thead>
            <tr>
                <th>Rank</th>
                <th>Service</th>
                <th>Monthly Cost</th>
            </tr>
            </thead>
            <tbody id="topExpensesTable">
            </tbody>
        </table>
    </div>

    <div class="upcoming analytics-section margin-top-30">
        <h2>Spending by Category</h2>
        <table class="subscriptions">
            <thead>
            <tr>
                <th>Category</th>
                <th>Sub Count</th>
                <th>Total Cost</th>
            </tr>
            </thead>
            <tbody id="subByCategoryTable">
            </tbody>
        </table>
    </div>
</div>
<script src="../js/analytics.js"></script>
</body>
</html>
