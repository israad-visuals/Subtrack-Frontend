<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SubTrack Dashboard</title>
    <link rel="stylesheet" href="../css/subtrack_styles.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body class="dash-body">
    <div id="nav"> </div>

    <script>
        fetch("navbar.html").then(r=>r.text()).then(html=>document.getElementById("nav").innerHTML=html);
    </script>
            <div class="dash-welcome">
            <h2>Welcome, here is your financial snapshot</h2>

            <div class="stat-cards">
                <div class="stat-card">
                    <h4>Monthly Burn Rate</h4>
                    <p id="burnRate">Loading...</p>
                </div>

                <div class="stat-card">
                    <h4>Active Subscriptions</h4>
                    <p id="activeCount">loading...</p>
                    <p id="trialCount">loading...</p>
                </div>

                <div class="stat-card">
                    <h4>This Week</h4>
                    <p id="dueThisWeek">loading...</p>
                    <p>Payments due</p>
                </div>

                <div class="stat-card">
                    <h4>Saved This Month</h4>
                    <p id="savedAmount">loading...</p>
                    <p>From cancelled subscriptions</p>
                </div>
            </div>

        <div class="upcoming">
            <h2>Upcoming payments this month:</h2>
            <table class="subscriptions">
                <thead>
                <tr>
                    <th>Service</th>
                    <th>Cost</th>
                    <th>Cycle</th>
                    <th>Category</th>
                    <th>Payment date</th>
                </tr>
                </thead>
                <tbody id="subscriptionsTable">
                </tbody>
            </table>
        </div>

    </div>
<script src="../js/dashboard.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
