<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Subscriptions</title>
    <link rel="stylesheet" href="../css/subtrack_styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dash-body">

<div id="nav"></div>

<script>
    fetch("navbar.html")
        .then(r => r.text())
        .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div class="subscriptions-page">
    <div class="dash-welcome">
        <h2>My Subscriptions</h2>
        <p class="subscription-subtitle">
            View and Edit all your subscriptions
        </p>
    </div>
    <div class="subscriptions-controls">
        <input type="text" placeholder="Search subscriptions..." id="subscriptions-search">
        <select id="category-box">
            <option>All Categories</option>
            <option>Entertainment</option>
            <option>Productivity</option>
            <option>Education</option>
            <option>Health & Fitness</option>
            <option>Shopping</option>
            <option>Finance</option>
            <option>Other</option>
        </select>

        <select id="filter-box">
            <option>Sort by: Next Billing</option>
            <option>Cost (High to Low)</option>
            <option>Cost (Low to High)</option>
            <option>Name (A-Z)</option>
        </select>
        <button onclick="location.href='add-subscription.html'" id="add-button">
            + Add New
        </button>


    </div>
    <div class="upcoming">
        <table class="subscriptions">
            <thead>
            <tr>
                <th>Service</th>
                <th>Category</th>
                <th>Cost</th>
                <th>Billing cycle</th>
                <th>Status</th>
                <th>Edit</th>
            </tr>
            </thead>
            <tbody id="subListTable">
            </tbody>
        </table>

    </div>
    <p class="subscriptions-summary">
    </p>
</div>

<script src="../js/subscriptions.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
