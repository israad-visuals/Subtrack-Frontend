<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SubTrack register</title>
    <link rel="stylesheet" href="subtrack_styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
<div class="logo">
    <h1>Subtrack</h1>
    <h2>Take control of your subscriptions</h2>
</div>

<div class="login-card">
    <h3>Create Account</h3>

    <div class="error-message">
        Password must be at least 8 characters!
    </div>
    <form action="login.html">
        <label for="name">Full name:</label>
        <input  type="text" id="name" placeholder="John doe">
        <br>
        <label for="email">Email: </label>
        <input type="email" id="email" placeholder="you@example.com">
        <label for="password">Password:</label>
        <input type="password"  id="password" placeholder="enter your password">
        <label for="confirm-password">Confirm Password:</label>
        <input type="password"  id="confirm-password" placeholder="enter the same password">
        <label>Currency: CAD*more currencies coming soon</label>
        <div class="primary-button">
            <button type="submit">Create Account</button>
        </div>
        <div class="divider-line">
            <hr>
            <p>or</p>
            <hr>
        </div>
        <div class="register">
            <p>Already have an Account? <a href="login.html">Sign in!</a></p>
        </div>
    </form>
</div>

</body>
</html>
